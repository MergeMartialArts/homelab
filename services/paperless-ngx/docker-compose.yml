# Docker Compose file for running paperless from the docker container registry.
# This file contains everything paperless needs to run.
# Paperless supports amd64, arm and arm64 hardware.
#
# All compose files of paperless configure paperless in the following way:
#
# - Paperless is (re)started on system boot, if it was running before shutdown.
# - Docker volumes for storing data are managed by Docker.
# - Folders for importing and exporting files are created in the same directory
#   as this file and mounted to the correct folders inside the container.
# - Paperless listens on port 8000.
#
# In addition to that, this Docker Compose file adds the following optional
# configurations:
#
# - Instead of SQLite (default), PostgreSQL is used as the database server.
# - Apache Tika and Gotenberg servers are started with paperless and paperless
#   is configured to use these services. These provide support for consuming
#   Office documents (Word, Excel, Power Point and their LibreOffice counter-
#   parts.
#
# To install and update paperless with this file, do the following:
#
# - Copy this file as 'docker-compose.yml' and create a '.env' file.
# - Run 'docker compose pull'.
# - Run 'docker compose run --rm webserver createsuperuser' to create a user.
# - Run 'docker compose up -d'.
#
# For more extensive installation and update instructions, refer to the
# documentation.
services:
  broker:
    image: docker.io/library/redis:8
    restart: unless-stopped
    labels:
      - "homelab.monitor=true"
      - "homelab.service=paperless-redis"
    volumes:
      - redisdata:/data
    # healtchecks come with depdendcies like curl, so make sure they are installed and ready to use.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
  db:
    image: docker.io/library/postgres:18
    restart: unless-stopped
    labels:
      - "homelab.monitor=true"
      - "homelab.service=paperless-postgres"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U paperless"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
  webserver:
    build: .
    user: "${USERMAP_UID}:${USERMAP_GID}"
    restart: unless-stopped
    labels:
      - "homelab.monitor=true"
      - "homelab.service=paperless-webserver"
      - "com.centurylinklabs.watchtower.enable=false"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
      tika:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ${PAPERLESS_DIR}/data:/usr/src/paperless/data
      - ${PAPERLESS_DIR}/media:/usr/src/paperless/media
      - ${PAPERLESS_DIR}/export:/usr/src/paperless/export
      - ${PAPERLESS_DIR}/consume:/usr/src/paperless/consume
    env_file:
      - .env
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_DBENGINE: postgresql
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.7
    restart: unless-stopped
    labels:
      - "homelab.monitor=true"
      - "homelab.service=paperless-gotenberg"
    # The gotenberg chromium route is used to convert .eml files. We do not
    # want to allow external content like tracking pixels or even javascript.
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:3000/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
  tika:
    image: docker.io/apache/tika:latest
    restart: unless-stopped
    labels:
      - "homelab.monitor=true"
      - "homelab.service=paperless-tika"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/localhost/9998 && echo -e \"GET /tika HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q Apache'"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
  paperless-ngx-updater-for-watchtower-monitoring:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    entrypoint: ["tail", "-f", "/dev/null"]  # keeps it running, does nothing
    labels:
      - "com.centurylinklabs.watchtower.monitor-only=true"
      - "homelab.monitor-only-for-possible-updates=true"
    restart: unless-stopped
    healthcheck:
      disable: true
volumes:
  pgdata:
  redisdata: