services:
  api:
    build: .
    restart: unless-stopped
    labels:
      - "homelab.monitor=true"
      - "homelab.service=homelab-api"
      - "com.centurylinklabs.watchtower.enable=false"
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount at the same host path so docker compose resolves relative volume paths correctly
      - ${HOST_SERVICES_DIR}:${HOST_SERVICES_DIR}
    environment:
      - SERVICES_DIR=${HOST_SERVICES_DIR}
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  python-base-updater-for-watchtower-monitoring:
    image: python:3.14-slim
    entrypoint: ["tail", "-f", "/dev/null"]
    labels:
      - "com.centurylinklabs.watchtower.monitor-only=true"
      - "homelab.monitor-only-for-possible-updates=true"
    restart: unless-stopped
    healthcheck:
      disable: true
  docker-cli-updater-for-watchtower-monitoring:
    image: docker:27-cli
    entrypoint: ["tail", "-f", "/dev/null"]
    labels:
      - "com.centurylinklabs.watchtower.monitor-only=true"
      - "homelab.monitor-only-for-possible-updates=true"
    restart: unless-stopped
    healthcheck:
      disable: true
