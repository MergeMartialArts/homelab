<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homelab</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #111;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
        }
        h1 { font-size: 1.1rem; font-weight: 600; }
        #subtitle { font-size: 0.8rem; color: #555; }

        main {
            padding: 1.5rem;
            max-width: 640px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .section-label {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 0.6rem;
        }

        .global-actions {
            display: flex;
            gap: 0.5rem;
        }

        .service-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 0.6rem;
        }
        .service-card:last-child { margin-bottom: 0; }

        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .service-name { font-size: 0.9rem; font-weight: 500; }

        .status-badge {
            font-size: 0.68rem;
            font-weight: 500;
            padding: 0.2rem 0.55rem;
            border-radius: 999px;
            white-space: nowrap;
        }
        .status-healthy   { background: #064e3b; color: #6ee7b7; }
        .status-running   { background: #1e3a5f; color: #93c5fd; }
        .status-starting  { background: #451a03; color: #fcd34d; }
        .status-unhealthy { background: #450a0a; color: #fca5a5; }
        .status-stopped   { background: #1f2937; color: #6b7280; }
        .status-unknown   { background: #1f2937; color: #4b5563; }

        .actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.45rem 0.9rem;
            border: none;
            border-radius: 7px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: opacity 0.1s;
            min-height: 36px;
        }
        button:active  { opacity: 0.6; }
        button:disabled { opacity: 0.3; cursor: default; }

        .btn-start   { background: #1d4ed8; color: #fff; }
        .btn-stop    { background: #b91c1c; color: #fff; }
        .btn-setup   { background: #374151; color: #e0e0e0; }
        .btn-health  { background: #065f46; color: #6ee7b7; }
        .btn-info    { background: #292929; color: #9ca3af; }

        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 1rem;
        }
        .modal-backdrop.open { display: block; }

        .modal {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            width: 100%;
            max-width: 640px;
            margin: 1rem auto;
            padding: 1.25rem;
            overflow-x: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }
        .modal-title { font-size: 0.95rem; font-weight: 600; }
        .modal-close {
            background: none;
            border: none;
            color: #555;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0;
            min-height: auto;
            line-height: 1;
        }
        .modal-close:hover { color: #999; }

        .readme { font-size: 0.85rem; line-height: 1.65; color: #ccc; }
        .readme h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; color: #e0e0e0; }
        .readme h2 { font-size: 0.95rem; font-weight: 600; margin: 1.25rem 0 0.5rem; color: #e0e0e0; border-bottom: 1px solid #2a2a2a; padding-bottom: 0.25rem; }
        .readme h3 { font-size: 0.85rem; font-weight: 600; margin: 1rem 0 0.4rem; color: #aaa; }
        .readme p  { margin-bottom: 0.65rem; }
        .readme a  { color: #60a5fa; }
        .readme code { background: #0d0d0d; padding: 0.15em 0.35em; border-radius: 4px; font-family: 'SF Mono', ui-monospace, monospace; font-size: 0.78rem; color: #e0e0e0; }
        .readme pre { background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 8px; padding: 0.85rem 1rem; overflow-x: auto; margin-bottom: 0.75rem; max-width: 100%; }
        .readme pre code { background: none; padding: 0; font-size: 0.78rem; }
        .readme ul, .readme ol { padding-left: 1.4rem; margin-bottom: 0.65rem; }
        .readme li { margin-bottom: 0.25rem; }
        .readme table { width: 100%; border-collapse: collapse; margin-bottom: 0.75rem; font-size: 0.8rem; }
        .readme th, .readme td { border: 1px solid #2a2a2a; padding: 0.4rem 0.65rem; text-align: left; }
        .readme th { background: #111; color: #aaa; font-weight: 600; }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }
        #output-label { font-size: 0.75rem; color: #555; font-family: monospace; }
        #clear-btn {
            font-size: 0.7rem;
            color: #555;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            min-height: auto;
        }
        #clear-btn:hover { color: #999; }

        #output {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 1rem;
            font-family: 'SF Mono', ui-monospace, monospace;
            font-size: 0.76rem;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 140px;
            max-height: 420px;
            overflow-y: auto;
            color: #ccc;
            transition: border-color 0.2s;
        }
        #output.running { border-color: #1d4ed8; }
        #output.success { border-color: #065f46; }
        #output.error   { border-color: #b91c1c; }
        #output:empty::before {
            content: 'Output appears here.';
            color: #333;
        }
    </style>
</head>
<body>

<header>
    <h1>Homelab</h1>
    <span id="subtitle"></span>
</header>

<main>
    <div>
        <p class="section-label">Global</p>
        <div class="global-actions">
            <button class="btn-start"  onclick="run('POST', '/services/all/start')">Start all</button>
            <button class="btn-stop"   onclick="run('POST', '/services/all/stop')">Stop all</button>
            <button class="btn-setup"  onclick="run('POST', '/services/all/setup')">Setup all</button>
            <button class="btn-health" onclick="run('GET',  '/health')">Health</button>
        </div>
    </div>

    <div>
        <p class="section-label">Services</p>
        <div id="services"></div>
    </div>

    <div>
        <div class="output-header">
            <span id="output-label">—</span>
            <button id="clear-btn" onclick="clearOutput()">Clear</button>
        </div>
        <div id="output"></div>
    </div>
</main>

<script>
    let running = false;

    async function loadServices() {
        try {
            const res  = await fetch('/services');
            const data = await res.json();
            currentServices = data.services;
            renderServices(data.services);
            document.getElementById('subtitle').textContent =
                data.services.length + ' service' + (data.services.length !== 1 ? 's' : '');
        } catch {
            document.getElementById('subtitle').textContent = 'failed to load services';
        }
    }

    function renderServices(services) {
        document.getElementById('services').innerHTML = services.map(name => `
            <div class="service-card">
                <div class="service-header">
                    <div class="service-name">${name}</div>
                    <span class="status-badge status-unknown" id="status-${name}">…</span>
                </div>
                <div class="actions">
                    <button class="btn-start" onclick="run('POST','/services/${name}/start')">Start</button>
                    <button class="btn-stop"  onclick="run('POST','/services/${name}/stop')">Stop</button>
                    <button class="btn-setup" onclick="run('POST','/services/${name}/setup')">Setup</button>
                    <button class="btn-info"  onclick="showReadme('${name}')">Info</button>
                </div>
            </div>
        `).join('');
        loadStatuses(services);
    }

    let currentServices = [];

    async function loadStatuses(services) {
        await Promise.all(services.map(async name => {
            try {
                const res  = await fetch(`/services/${name}/status`);
                const data = await res.json();
                const el   = document.getElementById(`status-${name}`);
                if (el) {
                    el.textContent = data.status;
                    el.className   = `status-badge status-${data.status}`;
                }
            } catch { /* ignore */ }
        }));
    }

    async function run(method, path) {
        if (running) return;
        running = true;
        setButtons(true);

        const output = document.getElementById('output');
        output.textContent = '';
        output.className = 'running';
        document.getElementById('output-label').textContent = method + ' ' + path;

        try {
            const res     = await fetch(path, { method });
            const reader  = res.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                output.textContent += decoder.decode(value, { stream: true });
                output.scrollTop = output.scrollHeight;
            }

            output.className = output.textContent.includes('[exit 0') ? 'success' : 'error';
        } catch (e) {
            output.textContent = 'Error: ' + e.message;
            output.className = 'error';
        } finally {
            running = false;
            setButtons(false);
        }
    }

    function clearOutput() {
        const output = document.getElementById('output');
        output.textContent = '';
        output.className = '';
        document.getElementById('output-label').textContent = '—';
    }

    function setButtons(disabled) {
        document.querySelectorAll('button:not(#clear-btn)').forEach(b => b.disabled = disabled);
    }

    async function showReadme(name) {
        const res = await fetch(`/services/${name}/readme`);
        if (!res.ok) {
            document.getElementById('modal-title').textContent = name;
            document.getElementById('modal-content').textContent = 'No README found.';
            document.getElementById('modal').classList.add('open');
            return;
        }
        const text = await res.text();
        document.getElementById('modal-title').textContent = name;
        document.getElementById('modal-content').innerHTML = marked.parse(text);
        document.getElementById('modal').classList.add('open');
    }

    function closeModal(e) {
        if (!e || e.target === document.getElementById('modal')) {
            document.getElementById('modal').classList.remove('open');
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
    });

    loadServices();
    setInterval(() => { if (currentServices.length) loadStatuses(currentServices); }, 30000);
</script>

<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title" id="modal-title"></span>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="readme" id="modal-content"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
